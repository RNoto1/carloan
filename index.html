<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auto Loan Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #05f7ff;
    --magenta: #ff2bd6;
    --gold: #ffd23f;
    --green: #39ff88;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(circle at 50% 0%, #1a0f2e 0%, #0a0612 55%, #05030a 100%);
    font-family: 'VT323', monospace;
    color: #fff;
  }
  .arcade-title {
    font-family: 'Press Start 2P', monospace;
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.4; }
  }
  @keyframes pulseGlow {
    0%, 100% { filter: drop-shadow(0 0 8px currentColor); }
    50% { filter: drop-shadow(0 0 20px currentColor); }
  }
  @keyframes shakeX {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.9; }
  }
  @keyframes jackpotPop {
    0% { transform: scale(0.3) rotate(-8deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .neon-cyan { color: var(--cyan); text-shadow: 0 0 6px var(--cyan), 0 0 18px var(--cyan), 0 0 34px #0891a8; }
  .neon-magenta { color: var(--magenta); text-shadow: 0 0 6px var(--magenta), 0 0 18px var(--magenta), 0 0 34px #8a0e73; }
  .neon-gold { color: var(--gold); text-shadow: 0 0 6px var(--gold), 0 0 18px var(--gold), 0 0 34px #a17d0f; }
  .neon-green { color: var(--green); text-shadow: 0 0 6px var(--green), 0 0 18px var(--green), 0 0 34px #1a8f4a; }

  .cabinet {
    position: relative;
    width: 100%;
    max-width: 680px;
    border-radius: 20px;
    padding: 32px;
    background: linear-gradient(180deg, #1c1330 0%, #120b21 100%);
    border: 2px solid #3a2a5c;
  }
  .cabinet.shake { animation: shakeX 0.5s ease; }

  .marquee { text-align: center; margin-bottom: 22px; }
  .marquee-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
  .marquee h1 { font-size: 18px; letter-spacing: 1px; margin: 0; }
  .marquee .sub { font-size: 20px; }
  .car-icon { font-size: 26px; }

  .section-label {
    font-size: 17px;
    letter-spacing: 1px;
    margin: 6px 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px dashed #3a2a5c;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
  }
  .field label {
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .field .hint { font-size: 13px; color: #8b7fb0; }
  .field input {
    width: 100%;
    padding: 8px 12px;
    font-size: 22px;
    font-family: 'VT323', monospace;
    color: #fff;
    background: #150e26;
    border: 2px solid #05f7ff55;
    border-radius: 6px;
    outline: none;
  }
  .field.gold input { border-color: #ffd23f55; }
  .field.green input { border-color: #39ff8855; }
  .field input:focus { border-color: var(--cyan); }
  .field.gold input:focus { border-color: var(--gold); }
  .field.green input:focus { border-color: var(--green); }

  .btn-row { display: flex; gap: 12px; justify-content: center; margin: 22px 0; }
  .btn-calc {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #fff;
    background: linear-gradient(180deg, #ff2bd6 0%, #a10e8a 100%);
    border: none;
    padding: 14px 24px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 6px 0 #6b0a5c, 0 8px 14px rgba(255,43,214,0.4);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn-calc:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #6b0a5c, 0 4px 8px rgba(255,43,214,0.4);
  }
  .btn-reset {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #d1d5db;
    background: linear-gradient(180deg, #2a2440 0%, #171228 100%);
    border: 2px solid #4a3d70;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
  }

  .scoreboard {
    display: none;
    border-radius: 12px;
    padding: 20px;
    background: #08050f;
    border: 2px solid #3a2a5c;
    box-shadow: inset 0 0 20px rgba(5,247,255,0.08);
  }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    text-align: center;
  }
  @media (max-width: 480px) {
    .stats { grid-template-columns: 1fr; }
  }
  .stat-label { font-size: 15px; letter-spacing: 1px; color: #9ca3af; margin-bottom: 6px; }
  .stat-value { font-family: 'Press Start 2P', monospace; font-size: 16px; }

  .breakdown {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed #3a2a5c;
    font-size: 19px;
  }
  .breakdown .row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }
  .breakdown .row .savings { color: var(--green); }
  .breakdown .row.total { font-size: 21px; margin-top: 6px; padding-top: 8px; border-top: 1px solid #3a2a5c; }

  .over-budget { text-align: center; margin-top: 16px; font-size: 22px; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    align-items: center;
    justify-content: center;
    background: rgba(5,3,10,0.72);
  }
  .overlay.show { display: flex; }
  .jackpot-box { text-align: center; animation: jackpotPop 0.5s ease-out; }
  .trophy { font-size: 56px; display: block; margin-bottom: 8px; animation: pulseGlow 0.8s infinite; }
  .jackpot-title { font-size: 40px; letter-spacing: 2px; }
  .jackpot-sub { font-size: 26px; margin-top: 10px; }

  .coin {
    position: fixed;
    top: -30px;
    z-index: 60;
    animation-name: fall;
    animation-timing-function: cubic-bezier(0.4,0,0.6,1);
    animation-fill-mode: forwards;
  }
</style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="jackpot-box">
      <span class="trophy neon-gold">🏆</span>
      <div class="arcade-title neon-gold jackpot-title">JACKPOT!</div>
      <div class="neon-cyan jackpot-sub" id="jackpotSub"></div>
    </div>
  </div>

  <div class="cabinet" id="cabinet">
    <div class="marquee">
      <div class="marquee-row">
        <span class="car-icon neon-cyan">🚗</span>
        <h1 class="arcade-title neon-cyan">AUTO LOAN ARCADE</h1>
        <span class="car-icon neon-cyan" style="transform: scaleX(-1);">🚗</span>
      </div>
      <div class="sub neon-magenta">INSERT NUMBERS TO PLAY</div>
    </div>

    <div class="section-label neon-cyan">◆ THE CAR</div>
    <div class="grid">
      <div class="field">
        <label class="neon-cyan">PURCHASE PRICE ($)</label>
        <input type="number" id="price" value="10000" />
      </div>
      <div class="field gold">
        <label class="neon-gold">TAX RATE (%) <span class="hint">— PA is 6%</span></label>
        <input type="number" step="0.01" id="taxRate" value="6" />
      </div>
      <div class="field">
        <label class="neon-cyan">FEES ($) <span class="hint">— optional</span></label>
        <input type="number" id="fees" value="0" />
      </div>
      <div class="field green">
        <label class="neon-green">TRADE-IN ($) <span class="hint">— optional</span></label>
        <input type="number" id="tradeIn" value="0" />
      </div>
      <div class="field">
        <label class="neon-cyan">DOWN PAYMENT ($) <span class="hint">— optional</span></label>
        <input type="number" id="down" value="0" />
      </div>
    </div>

    <div class="section-label neon-magenta">◆ THE LOAN</div>
    <div class="grid">
      <div class="field">
        <label class="neon-cyan">INTEREST RATE (%)</label>
        <input type="number" step="0.01" id="rate" value="6.5" />
      </div>
      <div class="field">
        <label class="neon-cyan">LOAN TERM (YEARS)</label>
        <input type="number" id="years" value="5" />
      </div>
      <div class="field gold">
        <label class="neon-gold">MAX $/MONTH GOAL <span class="hint">— optional</span></label>
        <input type="number" id="budget" value="0" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-calc" id="calcBtn">⚡ CALCULATE</button>
      <button class="btn-reset" id="resetBtn">↺ RESET</button>
    </div>

    <div class="scoreboard" id="scoreboard">
      <div class="stats">
        <div>
          <div class="stat-label">MONTHLY PAYMENT</div>
          <div class="stat-value neon-cyan" id="monthlyOut">$0</div>
        </div>
        <div>
          <div class="stat-label">TOTAL PAID</div>
          <div class="stat-value neon-magenta" id="totalOut">$0</div>
        </div>
        <div>
          <div class="stat-label">TOTAL INTEREST</div>
          <div class="stat-value neon-gold" id="interestOut">$0</div>
        </div>
      </div>

      <div class="breakdown" id="breakdown">
        <div class="row"><span>Purchase price</span><span id="bdPrice">$0</span></div>
        <div class="row"><span>Taxable amount <span style="color:#8b7fb0;font-size:15px;">(price − trade-in)</span></span><span id="bdTaxable">$0</span></div>
        <div class="row"><span>Sales tax</span><span id="bdTax">$0</span></div>
        <div class="row" id="bdSavingsRow" style="display:none;"><span>Trade-in tax savings</span><span class="savings" id="bdSavings">$0</span></div>
        <div class="row"><span>Fees</span><span id="bdFees">$0</span></div>
        <div class="row"><span>Down payment</span><span id="bdDown">$0</span></div>
        <div class="row"><span>Trade-in credit</span><span id="bdTrade">$0</span></div>
        <div class="row total neon-cyan"><span>AMOUNT FINANCED</span><span id="bdFinanced">$0</span></div>
      </div>

      <div class="over-budget neon-magenta" id="overBudget" style="display:none;"></div>
    </div>
  </div>

<script>
  const fmt = (v) => Math.round(v).toLocaleString();
  const num = (id) => parseFloat(document.getElementById(id).value) || 0;

  function runCalc() {
    const price   = num('price');
    const taxRate = num('taxRate');
    const fees    = num('fees');
    const tradeIn = num('tradeIn');
    const down    = num('down');
    const annualRate = num('rate');
    const n = num('years') * 12;
    const budget = num('budget');

    if (price <= 0 || n <= 0) return;

    // PA rule: tax charged on (price - trade-in), never below 0
    const taxable = Math.max(price - tradeIn, 0);
    const tax = taxable * (taxRate / 100);
    const taxSavings = tradeIn > 0 ? Math.min(tradeIn, price) * (taxRate / 100) : 0;

    // Total cost of the deal, then subtract what you put down + trade
    const totalCost = price + tax + fees;
    const financed = Math.max(totalCost - down - tradeIn, 0);

    // Monthly payment
    const r = annualRate / 100 / 12;
    let M;
    if (r === 0) {
      M = financed / n;
    } else {
      M = (financed * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
    }
    const totalPaid = M * n;
    const interest = totalPaid - financed;

    // Top stats
    document.getElementById('monthlyOut').textContent = '$' + fmt(M);
    document.getElementById('totalOut').textContent = '$' + fmt(totalPaid);
    document.getElementById('interestOut').textContent = '$' + fmt(interest);

    // Breakdown
    document.getElementById('bdPrice').textContent = '$' + fmt(price);
    document.getElementById('bdTaxable').textContent = '$' + fmt(taxable);
    document.getElementById('bdTax').textContent = '$' + fmt(tax);
    document.getElementById('bdFees').textContent = '$' + fmt(fees);
    document.getElementById('bdDown').textContent = '-$' + fmt(down);
    document.getElementById('bdTrade').textContent = '-$' + fmt(tradeIn);
    document.getElementById('bdFinanced').textContent = '$' + fmt(financed);

    const savingsRow = document.getElementById('bdSavingsRow');
    if (taxSavings > 0) {
      savingsRow.style.display = 'flex';
      document.getElementById('bdSavings').textContent = '-$' + fmt(taxSavings);
    } else {
      savingsRow.style.display = 'none';
    }

    document.getElementById('scoreboard').style.display = 'block';

    // Budget check
    const hitJackpot = budget > 0 && M <= budget;
    const overBudgetEl = document.getElementById('overBudget');
    if (budget > 0 && !hitJackpot) {
      overBudgetEl.style.display = 'block';
      overBudgetEl.textContent = '$' + fmt(Math.abs(budget - M)) + '/mo OVER YOUR GOAL — TRY NEW NUMBERS';
    } else {
      overBudgetEl.style.display = 'none';
    }

    if (hitJackpot) {
      showJackpot(budget - M);
    } else {
      const cabinet = document.getElementById('cabinet');
      cabinet.classList.add('shake');
      setTimeout(() => cabinet.classList.remove('shake'), 500);
    }
  }

  function showJackpot(margin) {
    const overlay = document.getElementById('overlay');
    document.getElementById('jackpotSub').textContent =
      "You're under budget by $" + fmt(margin) + "/mo";
    overlay.classList.add('show');
    for (let i = 0; i < 24; i++) {
      const coin = document.createElement('div');
      coin.className = 'coin neon-gold';
      coin.textContent = '🪙';
      coin.style.left = Math.random() * 100 + '%';
      coin.style.fontSize = (14 + Math.random() * 18) + 'px';
      coin.style.animationDelay = (Math.random() * 0.6) + 's';
      coin.style.animationDuration = (1.4 + Math.random() * 1.2) + 's';
      overlay.appendChild(coin);
      setTimeout(() => coin.remove(), 3200);
    }
    setTimeout(() => overlay.classList.remove('show'), 2600);
  }

  function resetAll() {
    document.getElementById('price').value = '';
    document.getElementById('taxRate').value = '6';
    document.getElementById('fees').value = '0';
    document.getElementById('tradeIn').value = '0';
    document.getElementById('down').value = '0';
    document.getElementById('rate').value = '';
    document.getElementById('years').value = '';
    document.getElementById('budget').value = '0';
    document.getElementById('scoreboard').style.display = 'none';
  }

  document.getElementById('calcBtn').addEventListener('click', runCalc);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
</script>

</body>
</html>
